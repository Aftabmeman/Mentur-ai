<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Mentur AI</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #f8fafc; 
            color: #1e293b; 
            text-align: center; 
        }
        .container { padding: 20px; max-width: 400px; }
        h1 { color: #9333ea; font-size: 2rem; margin-bottom: 10px; }
        p { color: #64748b; line-height: 1.5; }
        .btn {
            margin-top: 24px;
            padding: 12px 24px;
            background: #9333ea;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(147, 51, 234, 0.3);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
            <path d="M16.72 11.06A5 5 0 0 0 15 10h-1a2 2 0 0 1-2-2V7a3 3 0 0 0-3-3l-2.01.01"></path>
            <path d="M6.17 6.17a2.5 2.5 0 0 0-1.01 1.01"></path>
            <path d="M12 17v4"></path>
            <path d="m15 20-3 3-3-3"></path>
            <path d="M12 13V9"></path>
            <path d="M21 21l-4-4"></path>
            <path d="M17 21l4-4"></path>
        </svg>
        <h1>You're Offline</h1>
        <p>It looks like your internet connection is resting. Check your connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
